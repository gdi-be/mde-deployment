- id: 5
  shortname: Standard alt
  active: false
  description: |
    Für die Verwendung der Daten gelten folgende Nutzungsbestimmungen: http://www.stadtentwicklung.berlin.de/geoinformation/download/nutzIII.pdf - Der Quellenvermerk gemäß §2 lautet "Geoportal Berlin / [Titel des Datensatzes]".

    Datenbereitstellung:
    Da die Daten nicht heruntergeladen werden können, werden sie auf maschinenlesbaren Datenträgern bereit gestellt. Für die Bereitstellung können Gebühren von 2,50 € bis maximal 50,00  € und ggf. zzgl. Barauslagen für Materialkosten oder für Lizenzrechte Dritter anfallen. Für eine Datenbereitstellung wenden Sie sich bitte an die Dienstkräfte, die unter "Kontakte" aufgeführt sind.
  openData: true
  json:
    id: geonutz-be-2013-10-01
    name: Nutzungsbestimmungen für die Bereitstellung von Geodaten des Landes Berlin
    url: http://www.stadtentwicklung.berlin.de/geoinformation/download/nutzIII.pdf
    quelle: Geoportal Berlin / [Titel des Datensatzes]

